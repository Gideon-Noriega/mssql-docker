version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-dev
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}
    ports:
      - "1433:1433"
    volumes:
      - "E:/Program Files/Microsoft SQL Server/MSSQL14.BETLIONPROD/MSSQL/DATA:/var/opt/mssql/data"
    restart: unless-stopped